name: Compile Typst to PDF and Release

on:
  push:
    branches:
      - main
    paths:
      - '**.typ'
      - '.github/workflows/**'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for creating releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive # Fetch submodules (like Typst_Template)

      - name: Setup Typst
        uses: typst-community/setup-typst@v3

      - name: Download Harano Aji Fonts
        run: |
          mkdir -p .fonts
          # Download using curl with retries and timeouts to prevent hangs
          # -f: fail on server error, -L: follow redirects, -o: output file
          curl -fLo .fonts/HaranoAjiMincho-Regular.otf --retry 3 --connect-timeout 10 --max-time 300 \
            https://github.com/trueroad/HaranoAjiFonts/raw/master/HaranoAjiMincho-Regular.otf
          curl -fLo .fonts/HaranoAjiMincho-Bold.otf --retry 3 --connect-timeout 10 --max-time 300 \
            https://github.com/trueroad/HaranoAjiFonts/raw/master/HaranoAjiMincho-Bold.otf

      - name: Compile Typst
        env:
          TYPST_FONT_PATHS: .fonts
        run: |
          # Automatically compile all .typ files in the root directory
          # To exclude specific files, add them to the case statement below
          for file in *.typ; do
            case "$file" in
              lib.typ|utils.typ|*.template.typ)
                echo "Skipping ignored file: $file"
                continue
                ;;
            esac
            
            if [ -f "$file" ]; then
              echo "Compiling $file..."
              typst compile "$file" "${file%.typ}.pdf"
            fi
          done

      - name: Create Release and Upload PDF
        uses: softprops/action-gh-release@v2
        if: hashFiles('*.pdf') != '' # Only create a release if at least one PDF was generated
        with:
          tag_name: build-${{ github.run_number }}
          name: Auto-generated Report (Build ${{ github.run_number }})
          body: "Automated PDF build triggered by commit ${{ github.sha }}"
          files: "*.pdf"
          fail_on_unmatched_files: false
